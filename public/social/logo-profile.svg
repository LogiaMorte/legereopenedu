<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0E16"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="rgba(212,168,67,0.12)"/>
      <stop offset="100%" stop-color="rgba(212,168,67,0)"/>
    </radialGradient>
    <filter id="goldGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.6 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
      <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.3 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="175" rx="160" ry="120" fill="url(#glowCenter)"/>

  <!-- Subtle particle dots -->
  <circle cx="65" cy="80" r="1.5" fill="#D4A843" opacity="0.25"/>
  <circle cx="340" cy="95" r="1" fill="#D4A843" opacity="0.2"/>
  <circle cx="90" cy="320" r="1.2" fill="#D4A843" opacity="0.2"/>
  <circle cx="320" cy="300" r="1.5" fill="#D4A843" opacity="0.15"/>
  <circle cx="50" cy="200" r="1" fill="#D4A843" opacity="0.2"/>
  <circle cx="355" cy="210" r="1.3" fill="#D4A843" opacity="0.18"/>
  <circle cx="150" cy="50" r="1" fill="#D4A843" opacity="0.15"/>
  <circle cx="260" cy="60" r="0.8" fill="#D4A843" opacity="0.2"/>

  <!-- Connection lines (faint) -->
  <line x1="65" y1="80" x2="150" y2="50" stroke="#D4A843" stroke-width="0.4" opacity="0.1"/>
  <line x1="340" y1="95" x2="260" y2="60" stroke="#D4A843" stroke-width="0.4" opacity="0.1"/>
  <line x1="50" y1="200" x2="90" y2="320" stroke="#D4A843" stroke-width="0.4" opacity="0.08"/>
  <line x1="355" y1="210" x2="320" y2="300" stroke="#D4A843" stroke-width="0.4" opacity="0.08"/>

  <!-- Owl group centered -->
  <g transform="translate(200, 170) scale(2.8)">
    <!-- Hexagonal frame -->
    <path d="M0 -28L24.25 -14V14L0 28L-24.25 14V-14Z"
          stroke="url(#goldGrad)" stroke-width="1" fill="none" opacity="0.35" filter="url(#softGlow)"/>

    <!-- Owl face -->
    <path d="M0 -16C-10 -16 -16 -8 -16 0C-16 8 -10 16 0 20C10 16 16 8 16 0C16 -8 10 -16 0 -16Z"
          fill="rgba(212,168,67,0.06)" stroke="url(#goldGrad)" stroke-width="0.9"/>

    <!-- Left eye -->
    <circle cx="-7" cy="-2" r="6" stroke="#D4A843" stroke-width="1" fill="rgba(10,10,15,0.85)"/>
    <circle cx="-7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="-6" cy="-3" r="1" fill="#FFF8E1" opacity="0.85"/>

    <!-- Right eye -->
    <circle cx="7" cy="-2" r="6" stroke="#D4A843" stroke-width="1" fill="rgba(10,10,15,0.85)"/>
    <circle cx="7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="8" cy="-3" r="1" fill="#FFF8E1" opacity="0.85"/>

    <!-- Beak -->
    <path d="M0 3L-3 7L0 6L3 7Z" fill="#D4A843" opacity="0.9"/>

    <!-- Ear tufts -->
    <path d="M-14 -10L-10 -14L-12 -8" stroke="#D4A843" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M14 -10L10 -14L12 -8" stroke="#D4A843" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- Connection nodes -->
    <circle cx="-20" cy="0" r="1.2" fill="#D4A843" opacity="0.35"/>
    <circle cx="20" cy="0" r="1.2" fill="#D4A843" opacity="0.35"/>
    <circle cx="0" cy="-24" r="1.2" fill="#D4A843" opacity="0.35"/>
    <circle cx="0" cy="24" r="1.2" fill="#D4A843" opacity="0.35"/>
    <line x1="-20" y1="0" x2="-16" y2="0" stroke="#D4A843" stroke-width="0.4" opacity="0.25"/>
    <line x1="20" y1="0" x2="16" y2="0" stroke="#D4A843" stroke-width="0.4" opacity="0.25"/>
  </g>

  <!-- OWL Text -->
  <text x="200" y="295" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="38" letter-spacing="8" fill="url(#goldGrad)" filter="url(#softGlow)">OWL</text>

  <!-- Subtext -->
  <text x="200" y="325" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="11" letter-spacing="5" fill="#A0A0B0" opacity="0.7">OPEN WORKSHOP LAB</text>

  <!-- Bottom accent line -->
  <line x1="140" y1="345" x2="260" y2="345" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.3"/>
</svg>