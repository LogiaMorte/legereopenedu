<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="rgba(212,168,67,0.1)"/>
      <stop offset="100%" stop-color="rgba(212,168,67,0)"/>
    </radialGradient>
    <filter id="goldGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
      <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0A0A0F"/>
  <ellipse cx="200" cy="170" rx="140" ry="110" fill="url(#glow)"/>

  <!-- Owl centered and larger -->
  <g transform="translate(200, 180) scale(3.5)">
    <!-- Hexagonal frame -->
    <path d="M0 -28L24.25 -14V14L0 28L-24.25 14V-14Z"
          stroke="url(#goldGrad)" stroke-width="0.9" fill="none" opacity="0.3"/>

    <!-- Owl face -->
    <path d="M0 -16C-10 -16 -16 -8 -16 0C-16 8 -10 16 0 20C10 16 16 8 16 0C16 -8 10 -16 0 -16Z"
          fill="rgba(212,168,67,0.05)" stroke="url(#goldGrad)" stroke-width="0.8"/>

    <!-- Left eye -->
    <circle cx="-7" cy="-2" r="6" stroke="#D4A843" stroke-width="0.9" fill="rgba(10,10,15,0.85)"/>
    <circle cx="-7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="-6" cy="-3" r="1" fill="#FFF8E1" opacity="0.8"/>

    <!-- Right eye -->
    <circle cx="7" cy="-2" r="6" stroke="#D4A843" stroke-width="0.9" fill="rgba(10,10,15,0.85)"/>
    <circle cx="7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="8" cy="-3" r="1" fill="#FFF8E1" opacity="0.8"/>

    <!-- Beak -->
    <path d="M0 3L-3 7L0 6L3 7Z" fill="#D4A843" opacity="0.85"/>

    <!-- Ear tufts -->
    <path d="M-14 -10L-10 -14L-12 -8" stroke="#D4A843" stroke-width="0.7" fill="none" opacity="0.45"/>
    <path d="M14 -10L10 -14L12 -8" stroke="#D4A843" stroke-width="0.7" fill="none" opacity="0.45"/>
  </g>

  <!-- OWL Text large -->
  <text x="200" y="320" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="42" letter-spacing="10" fill="url(#goldGrad)">OWL</text>
</svg>