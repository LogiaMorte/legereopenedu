<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0E18"/>
      <stop offset="50%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#0C0C14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="30%" r="45%">
      <stop offset="0%" stop-color="rgba(212,168,67,0.1)"/>
      <stop offset="100%" stop-color="rgba(212,168,67,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="30%">
      <stop offset="0%" stop-color="rgba(212,168,67,0.06)"/>
      <stop offset="100%" stop-color="rgba(212,168,67,0)"/>
    </radialGradient>
    <filter id="goldGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
      <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.3 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#glow1)"/>
  <rect width="1080" height="1080" fill="url(#glow2)"/>

  <!-- Particle dots -->
  <circle cx="120" cy="180" r="2" fill="#D4A843" opacity="0.15"/>
  <circle cx="960" cy="220" r="1.5" fill="#D4A843" opacity="0.2"/>
  <circle cx="200" cy="900" r="1.8" fill="#D4A843" opacity="0.12"/>
  <circle cx="880" cy="850" r="2" fill="#D4A843" opacity="0.15"/>
  <circle cx="540" cy="100" r="1.2" fill="#D4A843" opacity="0.18"/>
  <circle cx="100" cy="500" r="1.5" fill="#D4A843" opacity="0.12"/>
  <circle cx="980" cy="600" r="1.3" fill="#D4A843" opacity="0.15"/>
  <line x1="120" y1="180" x2="540" y2="100" stroke="#D4A843" stroke-width="0.5" opacity="0.06"/>
  <line x1="880" y1="850" x2="980" y2="600" stroke="#D4A843" stroke-width="0.5" opacity="0.06"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1080" height="3" fill="url(#goldGrad)" opacity="0.4"/>

  <!-- Top section: Badge + Type -->
  <rect x="80" y="70" width="160" height="36" rx="18" fill="rgba(212,168,67,0.12)" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  <text x="160" y="93" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="13" letter-spacing="2" fill="#D4A843">YENI ATOLYE</text>

  <!-- Registration badge -->
  <rect x="820" y="70" width="180" height="36" rx="18" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <circle cx="850" cy="88" r="5" fill="#4ADE80" opacity="0.8"/>
  <text x="920" y="93" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="12" letter-spacing="1.5" fill="#4ADE80">KAYIT ACIK</text>

  <!-- OWL Logo (small, top center-ish area) -->
  <g transform="translate(540, 200) scale(2)">
    <path d="M0 -28L24.25 -14V14L0 28L-24.25 14V-14Z" stroke="url(#goldGrad)" stroke-width="0.8" fill="none" opacity="0.25"/>
    <path d="M0 -16C-10 -16 -16 -8 -16 0C-16 8 -10 16 0 20C10 16 16 8 16 0C16 -8 10 -16 0 -16Z" fill="rgba(212,168,67,0.05)" stroke="url(#goldGrad)" stroke-width="0.7"/>
    <circle cx="-7" cy="-2" r="6" stroke="#D4A843" stroke-width="0.8" fill="rgba(10,10,15,0.85)"/>
    <circle cx="-7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="-6" cy="-3" r="1" fill="#FFF8E1" opacity="0.8"/>
    <circle cx="7" cy="-2" r="6" stroke="#D4A843" stroke-width="0.8" fill="rgba(10,10,15,0.85)"/>
    <circle cx="7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="8" cy="-3" r="1" fill="#FFF8E1" opacity="0.8"/>
    <path d="M0 3L-3 7L0 6L3 7Z" fill="#D4A843" opacity="0.85"/>
    <path d="M-14 -10L-10 -14L-12 -8" stroke="#D4A843" stroke-width="0.6" fill="none" opacity="0.4"/>
    <path d="M14 -10L10 -14L12 -8" stroke="#D4A843" stroke-width="0.6" fill="none" opacity="0.4"/>
  </g>

  <!-- Decorative line separator -->
  <line x1="340" y1="290" x2="740" y2="290" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.2"/>

  <!-- Workshop Title Area -->
  <text x="540" y="380" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="52" fill="url(#goldGrad)" filter="url(#textGlow)">[ATOLYE ADI]</text>

  <text x="540" y="430" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="52" fill="url(#goldGrad)" filter="url(#textGlow)">[IKINCI SATIR]</text>

  <!-- Subtitle / Description -->
  <text x="540" y="490" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="22" fill="#A0A0B0" opacity="0.7">[Kisa aciklama buraya gelecek]</text>

  <!-- Discipline tags -->
  <g transform="translate(540, 560)">
    <rect x="-260" y="0" width="140" height="40" rx="8" fill="rgba(212,168,67,0.1)" stroke="rgba(212,168,67,0.25)" stroke-width="1"/>
    <text x="-190" y="26" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="1.5" fill="#D4A843" opacity="0.8">Kriminoloji</text>

    <rect x="-70" y="0" width="140" height="40" rx="8" fill="rgba(212,168,67,0.1)" stroke="rgba(212,168,67,0.25)" stroke-width="1"/>
    <text x="0" y="26" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="1.5" fill="#D4A843" opacity="0.8">Sosyoloji</text>

    <rect x="120" y="0" width="140" height="40" rx="8" fill="rgba(212,168,67,0.1)" stroke="rgba(212,168,67,0.25)" stroke-width="1"/>
    <text x="190" y="26" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="1.5" fill="#D4A843" opacity="0.8">Veri Bilimi</text>
  </g>

  <!-- Date + Info Cards -->
  <g transform="translate(0, 660)">
    <!-- Date card -->
    <rect x="80" y="0" width="440" height="120" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(212,168,67,0.15)" stroke-width="1"/>
    <text x="120" y="40" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#D4A843" opacity="0.6">TARIH</text>
    <text x="120" y="75" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="28" fill="#F0EDE6">[GG.AA.YYYY]</text>
    <text x="120" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="16" fill="#A0A0B0" opacity="0.6">3 Haftalik Periyot</text>

    <!-- Capacity card -->
    <rect x="560" y="0" width="440" height="120" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(212,168,67,0.15)" stroke-width="1"/>
    <text x="600" y="40" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#D4A843" opacity="0.6">KAPASITE</text>
    <text x="600" y="75" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="28" fill="#F0EDE6">Maks. 50</text>
    <text x="600" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="16" fill="#A0A0B0" opacity="0.6">Katilimci</text>
  </g>

  <!-- CTA Button -->
  <rect x="340" y="850" width="400" height="60" rx="12" fill="url(#goldGrad)"/>
  <text x="540" y="888" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="20" letter-spacing="2" fill="#0A0A0F">ON KAYIT ICIN LINK BIODA</text>

  <!-- Footer -->
  <line x1="80" y1="960" x2="1000" y2="960" stroke="rgba(212,168,67,0.1)" stroke-width="1"/>
  <text x="540" y="1000" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#D4A843" opacity="0.4">legereopenedu.com</text>
  <text x="540" y="1030" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="12" fill="#A0A0B0" opacity="0.35">Legere — Okumak, Secmek, Bir Araya Getirmek</text>

  <!-- Bottom border accent -->
  <rect x="0" y="1077" width="1080" height="3" fill="url(#goldGrad)" opacity="0.4"/>
</svg>