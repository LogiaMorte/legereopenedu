<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E0E18"/>
      <stop offset="50%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#08080D"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="rgba(212,168,67,0.1)"/>
      <stop offset="100%" stop-color="rgba(212,168,67,0)"/>
    </radialGradient>
    <filter id="goldGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
      <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
      <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.25 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#centerGlow)"/>

  <!-- Side accent lines -->
  <rect x="0" y="0" width="3" height="1920" fill="url(#goldGrad)" opacity="0.15"/>
  <rect x="1077" y="0" width="3" height="1920" fill="url(#goldGrad)" opacity="0.15"/>

  <!-- Particles -->
  <circle cx="150" cy="300" r="2" fill="#D4A843" opacity="0.15"/>
  <circle cx="930" cy="400" r="1.5" fill="#D4A843" opacity="0.2"/>
  <circle cx="100" cy="1200" r="1.8" fill="#D4A843" opacity="0.12"/>
  <circle cx="980" cy="1100" r="2" fill="#D4A843" opacity="0.15"/>
  <circle cx="200" cy="1600" r="1.2" fill="#D4A843" opacity="0.18"/>
  <circle cx="880" cy="1500" r="1.5" fill="#D4A843" opacity="0.12"/>
  <line x1="150" y1="300" x2="930" y2="400" stroke="#D4A843" stroke-width="0.4" opacity="0.05"/>
  <line x1="100" y1="1200" x2="980" y2="1100" stroke="#D4A843" stroke-width="0.4" opacity="0.05"/>

  <!-- Top badge -->
  <rect x="340" y="200" width="400" height="44" rx="22" fill="rgba(212,168,67,0.1)" stroke="rgba(212,168,67,0.25)" stroke-width="1"/>
  <text x="540" y="229" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="14" letter-spacing="3" fill="#D4A843">YENI DUYURU</text>

  <!-- OWL Logo centered -->
  <g transform="translate(540, 500) scale(3.5)">
    <path d="M0 -28L24.25 -14V14L0 28L-24.25 14V-14Z" stroke="url(#goldGrad)" stroke-width="0.8" fill="none" opacity="0.25"/>
    <path d="M0 -16C-10 -16 -16 -8 -16 0C-16 8 -10 16 0 20C10 16 16 8 16 0C16 -8 10 -16 0 -16Z" fill="rgba(212,168,67,0.05)" stroke="url(#goldGrad)" stroke-width="0.7"/>
    <circle cx="-7" cy="-2" r="6" stroke="#D4A843" stroke-width="0.8" fill="rgba(10,10,15,0.85)"/>
    <circle cx="-7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="-6" cy="-3" r="1" fill="#FFF8E1" opacity="0.8"/>
    <circle cx="7" cy="-2" r="6" stroke="#D4A843" stroke-width="0.8" fill="rgba(10,10,15,0.85)"/>
    <circle cx="7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="8" cy="-3" r="1" fill="#FFF8E1" opacity="0.8"/>
    <path d="M0 3L-3 7L0 6L3 7Z" fill="#D4A843" opacity="0.85"/>
    <path d="M-14 -10L-10 -14L-12 -8" stroke="#D4A843" stroke-width="0.6" fill="none" opacity="0.4"/>
    <path d="M14 -10L10 -14L12 -8" stroke="#D4A843" stroke-width="0.6" fill="none" opacity="0.4"/>
  </g>

  <!-- OWL text -->
  <text x="540" y="650" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="56" letter-spacing="10" fill="url(#goldGrad)" filter="url(#textGlow)">OWL</text>
  <text x="540" y="695" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="16" letter-spacing="6" fill="#A0A0B0" opacity="0.5">OPEN WORKSHOP LAB</text>

  <!-- Separator -->
  <line x1="380" y1="740" x2="700" y2="740" stroke="url(#goldGrad)" stroke-width="1" opacity="0.25"/>

  <!-- Main announcement area -->
  <text x="540" y="860" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="54" fill="#F0EDE6">[BASLIK]</text>
  <text x="540" y="930" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="54" fill="#F0EDE6">[IKINCI SATIR]</text>

  <!-- Description -->
  <text x="540" y="1020" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="24" fill="#A0A0B0" opacity="0.7">[Aciklama metni]</text>
  <text x="540" y="1060" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="24" fill="#A0A0B0" opacity="0.7">[ikinci satir]</text>

  <!-- Date card -->
  <rect x="240" y="1140" width="600" height="100" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(212,168,67,0.15)" stroke-width="1"/>
  <text x="540" y="1185" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="2" fill="#D4A843" opacity="0.6">TARIH</text>
  <text x="540" y="1220" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="26" fill="#F0EDE6">[GG.AA.YYYY — GG.AA.YYYY]</text>

  <!-- CTA -->
  <rect x="290" y="1340" width="500" height="70" rx="14" fill="url(#goldGrad)"/>
  <text x="540" y="1384" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="22" letter-spacing="2" fill="#0A0A0F">DETAYLAR BIODA</text>

  <!-- Swipe up indicator -->
  <g transform="translate(540, 1550)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#D4A843" stroke-width="1.5" opacity="0.3"/>
    <path d="M-8 8L0 0L8 8" stroke="#D4A843" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>
  <text x="540" y="1620" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#A0A0B0" opacity="0.3">Yukari kaydir</text>

  <!-- Footer -->
  <text x="540" y="1800" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="3" fill="#D4A843" opacity="0.25">legereopenedu.com</text>
</svg>