<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0E18"/>
      <stop offset="50%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#0C0C14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="rgba(212,168,67,0.12)"/>
      <stop offset="100%" stop-color="rgba(212,168,67,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="30%" cy="75%" r="25%">
      <stop offset="0%" stop-color="rgba(212,168,67,0.06)"/>
      <stop offset="100%" stop-color="rgba(212,168,67,0)"/>
    </radialGradient>
    <filter id="goldGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
      <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
      <feColorMatrix values="0 0 0 0 0.83  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.25 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#glow1)"/>
  <rect width="1080" height="1080" fill="url(#glow2)"/>

  <!-- Accent lines -->
  <rect x="0" y="0" width="1080" height="3" fill="url(#goldGrad)" opacity="0.4"/>
  <rect x="0" y="1077" width="1080" height="3" fill="url(#goldGrad)" opacity="0.4"/>

  <!-- Particle network -->
  <circle cx="120" cy="150" r="2" fill="#D4A843" opacity="0.2"/>
  <circle cx="960" cy="120" r="1.5" fill="#D4A843" opacity="0.18"/>
  <circle cx="200" cy="950" r="1.8" fill="#D4A843" opacity="0.15"/>
  <circle cx="880" cy="930" r="2" fill="#D4A843" opacity="0.18"/>
  <circle cx="80" cy="540" r="1.5" fill="#D4A843" opacity="0.12"/>
  <circle cx="1000" cy="500" r="1.3" fill="#D4A843" opacity="0.15"/>
  <circle cx="540" cy="80" r="1.2" fill="#D4A843" opacity="0.2"/>
  <circle cx="300" cy="300" r="1" fill="#D4A843" opacity="0.1"/>
  <circle cx="780" cy="280" r="1.2" fill="#D4A843" opacity="0.1"/>
  <line x1="120" y1="150" x2="300" y2="300" stroke="#D4A843" stroke-width="0.4" opacity="0.06"/>
  <line x1="960" y1="120" x2="780" y2="280" stroke="#D4A843" stroke-width="0.4" opacity="0.06"/>
  <line x1="80" y1="540" x2="200" y2="950" stroke="#D4A843" stroke-width="0.4" opacity="0.04"/>
  <line x1="1000" y1="500" x2="880" y2="930" stroke="#D4A843" stroke-width="0.4" opacity="0.04"/>

  <!-- OWL Logo large centered -->
  <g transform="translate(540, 320) scale(4)">
    <!-- Hexagonal frame -->
    <path d="M0 -28L24.25 -14V14L0 28L-24.25 14V-14Z" stroke="url(#goldGrad)" stroke-width="0.8" fill="none" opacity="0.3" filter="url(#goldGlow)"/>

    <!-- Owl face -->
    <path d="M0 -16C-10 -16 -16 -8 -16 0C-16 8 -10 16 0 20C10 16 16 8 16 0C16 -8 10 -16 0 -16Z" fill="rgba(212,168,67,0.06)" stroke="url(#goldGrad)" stroke-width="0.7"/>

    <!-- Left eye -->
    <circle cx="-7" cy="-2" r="6" stroke="#D4A843" stroke-width="0.8" fill="rgba(10,10,15,0.85)"/>
    <circle cx="-7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="-6" cy="-3" r="1" fill="#FFF8E1" opacity="0.85"/>

    <!-- Right eye -->
    <circle cx="7" cy="-2" r="6" stroke="#D4A843" stroke-width="0.8" fill="rgba(10,10,15,0.85)"/>
    <circle cx="7" cy="-2" r="2.5" fill="#D4A843" filter="url(#goldGlow)"/>
    <circle cx="8" cy="-3" r="1" fill="#FFF8E1" opacity="0.85"/>

    <!-- Beak -->
    <path d="M0 3L-3 7L0 6L3 7Z" fill="#D4A843" opacity="0.9"/>

    <!-- Ear tufts -->
    <path d="M-14 -10L-10 -14L-12 -8" stroke="#D4A843" stroke-width="0.7" fill="none" opacity="0.45"/>
    <path d="M14 -10L10 -14L12 -8" stroke="#D4A843" stroke-width="0.7" fill="none" opacity="0.45"/>

    <!-- Connection nodes -->
    <circle cx="-20" cy="0" r="1.2" fill="#D4A843" opacity="0.3"/>
    <circle cx="20" cy="0" r="1.2" fill="#D4A843" opacity="0.3"/>
    <circle cx="0" cy="-24" r="1.2" fill="#D4A843" opacity="0.3"/>
    <circle cx="0" cy="24" r="1.2" fill="#D4A843" opacity="0.3"/>
    <line x1="-20" y1="0" x2="-16" y2="0" stroke="#D4A843" stroke-width="0.4" opacity="0.2"/>
    <line x1="20" y1="0" x2="16" y2="0" stroke="#D4A843" stroke-width="0.4" opacity="0.2"/>
  </g>

  <!-- OWL Text -->
  <text x="540" y="500" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="72" letter-spacing="14" fill="url(#goldGrad)" filter="url(#bigGlow)">OWL</text>

  <!-- Full name -->
  <text x="540" y="545" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="18" letter-spacing="7" fill="#A0A0B0" opacity="0.6">OPEN WORKSHOP LAB</text>

  <!-- Separator -->
  <line x1="380" y1="580" x2="700" y2="580" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Tagline -->
  <text x="540" y="635" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="22" fill="#F0EDE6" opacity="0.8">Disiplinlerarasi Akademik</text>
  <text x="540" y="670" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="22" fill="#F0EDE6" opacity="0.8">Arastirma Agi</text>

  <!-- Legere -->
  <text x="540" y="730" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-style="italic" font-weight="300" font-size="18" fill="#D4A843" opacity="0.5">Legere — Okumak, Secmek, Bir Araya Getirmek</text>

  <!-- Discipline chips -->
  <g transform="translate(540, 800)">
    <rect x="-450" y="0" width="180" height="36" rx="8" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.2)" stroke-width="0.8"/>
    <text x="-360" y="24" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="1" fill="#D4A843" opacity="0.7">Kriminoloji</text>

    <rect x="-230" y="0" width="150" height="36" rx="8" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.2)" stroke-width="0.8"/>
    <text x="-155" y="24" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="1" fill="#D4A843" opacity="0.7">Sosyoloji</text>

    <rect x="-40" y="0" width="130" height="36" rx="8" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.2)" stroke-width="0.8"/>
    <text x="25" y="24" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="1" fill="#D4A843" opacity="0.7">Felsefe</text>

    <rect x="130" y="0" width="160" height="36" rx="8" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.2)" stroke-width="0.8"/>
    <text x="210" y="24" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="1" fill="#D4A843" opacity="0.7">Veri Bilimi</text>

    <rect x="330" y="0" width="120" height="36" rx="8" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.2)" stroke-width="0.8"/>
    <text x="390" y="24" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="1" fill="#D4A843" opacity="0.7">+ 8 alan</text>
  </g>

  <!-- CTA -->
  <rect x="340" y="890" width="400" height="56" rx="12" fill="url(#goldGrad)"/>
  <text x="540" y="925" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="18" letter-spacing="2" fill="#0A0A0F">ARAMIZA KATILIN</text>

  <!-- Footer -->
  <line x1="120" y1="990" x2="960" y2="990" stroke="rgba(212,168,67,0.1)" stroke-width="1"/>
  <text x="540" y="1030" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#D4A843" opacity="0.35">legereopenedu.com</text>
  <text x="540" y="1055" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="300" font-size="12" fill="#A0A0B0" opacity="0.25">Legere Open Edu</text>
</svg>